<svg width="340" height="310" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<style>
  #ring, #documents, #person-left, #person-right, #person-center, #shield, #naira-badge {
    opacity: 0;
    animation-fill-mode: forwards;
    animation-duration: 0.5s;
    animation-timing-function: ease-out;
  }
  #ring          { animation-name: fadeScale; animation-delay: 0s; transform-origin: 340px 300px; }
  #documents,
  #person-left,
  #person-right { animation-name: fadeUp; animation-delay: 0.3s; }
  #person-center { animation-name: fadeUp; animation-delay: 0.5s; }
  #shield        { animation-name: fadeScale; animation-delay: 0.8s; transform-origin: 340px 405px; }
  #naira-badge   { animation-name: popIn; animation-delay: 1.1s; animation-duration: 0.4s; transform-origin: 500px 470px; }

  @keyframes fadeScale {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.5); }
    70%  { opacity: 1; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
<title>Ajo logo</title>
<desc>Icon mark for the Ajo app: a two-tone blue ring, three community figures, a shield with a checkmark, and a green naira verification badge.</desc>

<g id="ring">
  <path id="ring-arc-light" d="M399.5,77.8 A230,230 0 0,1 556.1,378.7" fill="none" stroke="#4D7EFF" stroke-width="34" stroke-linecap="round"/>
  <path id="ring-arc-dark" d="M399.5,522.2 A230,230 0 1,1 280.5,77.8" fill="none" stroke="#0028C2" stroke-width="34" stroke-linecap="round"/>
</g>

<g id="documents">
  <g id="document-left" transform="rotate(-8 232 400)">
    <rect x="175" y="345" width="115" height="110" rx="14" fill="#0028C2"/>
    <line x1="195" y1="375" x2="270" y2="375" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="195" y1="400" x2="270" y2="400" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="195" y1="425" x2="270" y2="425" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g id="document-right" transform="rotate(8 447 400)">
    <rect x="390" y="345" width="115" height="110" rx="14" fill="#0028C2"/>
    <line x1="410" y1="375" x2="485" y2="375" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="410" y1="400" x2="485" y2="400" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="410" y1="425" x2="485" y2="425" stroke="#B3C5FF" stroke-width="6" stroke-linecap="round"/>
  </g>
</g>

<g id="people">
  <g id="person-left">
    <circle cx="270" cy="225" r="26" fill="#0028C2"/>
    <path d="M235,330 L235,278 Q235,258 270,258 Q305,258 305,278 L305,330 Z" fill="#0028C2"/>
  </g>
  <g id="person-right">
    <circle cx="410" cy="225" r="26" fill="#4D7EFF"/>
    <path d="M375,330 L375,278 Q375,258 410,258 Q445,258 445,278 L445,330 Z" fill="#4D7EFF"/>
  </g>
  <g id="person-center">
    <circle cx="340" cy="210" r="32" fill="#0035F0"/>
    <path d="M295,345 L295,270 Q295,248 340,248 Q385,248 385,270 L385,345 Z" fill="#0035F0"/>
  </g>
</g>

<g id="shield">
  <path id="shield-body" d="M340,335 L270,355 L270,415 Q270,460 340,480 Q410,460 410,415 L410,355 Z" fill="#0035F0" stroke="#FFFFFF" stroke-width="4"/>
  <path id="shield-check" d="M303,408 L328,435 L385,372" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<g id="naira-badge">
  <line id="naira-handle" x1="460" y1="510" x2="405" y2="565" stroke="#22C55E" stroke-width="16" stroke-linecap="round"/>
  <circle id="naira-circle" cx="500" cy="470" r="56" fill="#FFFFFF" stroke="#22C55E" stroke-width="8"/>
  <text x="500" y="493" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="60" fill="#22C55E">N</text>
  <line x1="470" y1="463" x2="530" y2="463" stroke="#22C55E" stroke-width="7"/>
  <line x1="470" y1="478" x2="530" y2="478" stroke="#22C55E" stroke-width="7"/>
</g>
</svg>
